name: Kotlin CI/CD

on:
  push:
    branches: [master]

env:
  APP_NAME: crm-api
  APP_DIR: /opt/crm-api
  APP_JAR: /opt/crm-api/crm-api.jar
  SERVICE_NAME: crm-api
  SERVICE_FILE: /etc/systemd/system/crm-api.service
  PORT: 8080

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Dar permissão ao gradlew
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build

      - name: Garantir diretório
        run: sudo mkdir -p ${{ env.APP_DIR }}

      - name: Copiar jar
        run: sudo cp build/libs/*.jar ${{ env.APP_JAR }}

      # 🔴 Mata qualquer processo na porta (evita conflito)
      - name: Liberar porta
        run: |
          sudo fuser -k ${{ env.PORT }}/tcp || true

      # 🔴 Criar/atualizar service (idempotente)
      - name: Criar service
        run: |
          sudo bash -c "cat > ${{ env.SERVICE_FILE }}" <<EOF
          [Unit]
          Description=CRM API
          After=network.target

          [Service]
          User=root
          WorkingDirectory=${{ env.APP_DIR }}
          ExecStart=/usr/bin/java -jar ${{ env.APP_JAR }} --server.port=${{ env.PORT }}
          SuccessExitStatus=143
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Reload systemd
        run: sudo systemctl daemon-reload

      - name: Enable service
        run: sudo systemctl enable ${{ env.SERVICE_NAME }}

      - name: Restart service
        run: sudo systemctl restart ${{ env.SERVICE_NAME }}

      - name: Status
        run: sudo systemctl status ${{ env.SERVICE_NAME }} --no-pager