name: Kotlin CI/CD

on:
  push:
    branches: [master]

env:
  APP_NAME: crm-api
  APP_DIR: /opt/crm-api
  APP_JAR: /opt/crm-api/crm-api.jar
  SERVICE_NAME: crm-api
  SERVICE_FILE: /etc/systemd/system/crm-api.service
  PORT: 8080

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Dar permissão ao gradlew
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build

      - name: Garantir diretório
        run: sudo mkdir -p ${{ env.APP_DIR }}

      - name: Criar ou atualizar service
        run: |
          sudo bash -c "cat > ${{ env.SERVICE_FILE }}" <<EOF
          [Unit]
          Description=CRM API
          After=network.target

          [Service]
          User=root
          WorkingDirectory=${{ env.APP_DIR }}
          ExecStart=/usr/bin/java -jar ${{ env.APP_JAR }} --server.port=${{ env.PORT }}
          SuccessExitStatus=143
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Reload systemd
        run: sudo systemctl daemon-reload

      - name: Enable service
        run: sudo systemctl enable ${{ env.SERVICE_NAME }}

      - name: Parar serviço se existir
        run: sudo systemctl stop ${{ env.SERVICE_NAME }} || true

      - name: Copiar jar executável
        run: |
          JAR_FILE=$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' | head -n 1)
          test -n "$JAR_FILE"
          sudo cp "$JAR_FILE" ${{ env.APP_JAR }}

      - name: Iniciar serviço
        run: sudo systemctl start ${{ env.SERVICE_NAME }}

      - name: Ver status do serviço
        run: sudo systemctl status ${{ env.SERVICE_NAME }} --no-pager || true

      - name: Health check
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:${{ env.PORT }} > /dev/null; then
              echo "Aplicação respondeu com sucesso."
              exit 0
            fi
            echo "Aguardando aplicação subir... tentativa $i/30"
            sleep 5
          done

          echo "Aplicação não respondeu no tempo esperado."
          echo "===== systemctl status ====="
          sudo systemctl status ${{ env.SERVICE_NAME }} --no-pager || true
          echo "===== journalctl ====="
          sudo journalctl -u ${{ env.SERVICE_NAME }} -n 200 --no-pager || true
          exit 1